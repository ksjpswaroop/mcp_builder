name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python and install dependencies
        run: uv sync

      - name: Validate mcp.yaml
        run: uv run python scripts/validate_template.py mcp.yaml

      - name: Stdio smoke test
        run: uv run python examples/stdio/smoke_client.py

      - name: Streamable HTTP smoke test (server + client in same step)
        run: |
          uv run python -m examples.streamable_http.server &
          sleep 5
          uv run python examples/streamable_http/smoke_client.py
        env:
          PYTHONUNBUFFERED: 1
